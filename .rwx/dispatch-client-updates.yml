on:
  github:
    push:
      if: ${{ event.git.branch == "main" }}
      init:
        commit-sha: ${{ event.git.sha }}
        base-ref: ${{ event.github.push.before }}
        head-ref: ${{ event.git.sha }}
  cli:
    init:
      commit-sha: ${{ event.git.sha }}
      head-ref: ${{ event.git.sha }}

base:
  image: ubuntu:24.04
  config: rwx/base 1.1.0

tasks:
  - key: rwx-cli
    call: rwx/install-cli 4.0.4

  - key: github-cli
    call: github/install-cli 1.0.10

  - key: src-changes
    use: github-cli
    call: github/compare 1.0.8
    with:
      repository: rwx-cloud/language-server
      base-ref: ${{ init.base-ref }}
      head-ref: ${{ init.head-ref }}
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      patterns: |
        src/**
        support/**

  - key: dispatch-cli-update
    if: ${{ tasks.src-changes.values.have-changes }}
    use: rwx-cli
    cache: false
    run: |
      rwx dispatch cli-language-server-update \
        --title "Update language-server-ref to rwx-cloud/language-server@${COMMIT_SHA:0:7}"
    env:
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}
      COMMIT_SHA: ${{ init.commit-sha }}

  - key: dispatch-vscode-extension-update
    if: ${{ tasks.src-changes.values.have-changes }}
    use: rwx-cli
    cache: false
    run: |
      rwx dispatch vscode-extension-language-server-update \
        --title "Update language server to rwx-cloud/language-server@${COMMIT_SHA:0:7}"
    env:
      RWX_ACCESS_TOKEN: ${{ secrets.RWX_ACCESS_TOKEN }}
      COMMIT_SHA: ${{ init.commit-sha }}
